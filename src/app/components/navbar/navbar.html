<!-- Navbar -->
<nav class="flex items-center justify-between px-4 sm:px-6 md:px-10 lg:px-12 py-4">

  <!-- Logo -->
  <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
    <img src="buckty.png" alt="Logo" class="h-9 w-auto object-contain rounded-xl" />
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-3">

    <!-- Theme toggle -->
    <button
      (click)="toggleTheme()"
      [attr.title]="isDark() ? 'Switch to Light mode' : 'Switch to Dark mode'"
      class="relative w-14 h-7 rounded-full transition-all duration-500 border-2 focus:outline-none flex items-center px-1 shrink-0"
      [ngClass]="isDark() ? 'bg-primary border-primary' : 'bg-transparent border-primary'"
    >
      <span
        class="w-5 h-5 rounded-full flex items-center justify-center transition-all duration-500 shadow-sm"
        [ngClass]="isDark() ? 'translate-x-6 bg-white' : 'translate-x-0 bg-primary'"
      >
        <svg *ngIf="!isDark()" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.293 13.293A8 8 0 016.707 2.707 8.001 8.001 0 1017.293 13.293z"/>
        </svg>
        <svg *ngIf="isDark()" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-primary" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
      </span>
    </button>

    <!-- NOT logged in -->
    <button
      *ngIf="!isLoggedIn()"
      routerLink="/login"
      class="px-5 md:px-8 py-2.5 rounded-2xl border border-primary text-primary font-medium hover:bg-primary hover:text-white transition-all duration-300 text-sm"
    >
      Login
    </button>

    <!-- Logged in — Avatar pill + dropdown -->
    <div class="relative" *ngIf="isLoggedIn() && currentUser()">

      <!-- Pill trigger -->
      <button
        (click)="toggleProfile()"
        class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-full border transition-all cursor-pointer"
        [ngClass]="isDark() ? 'bg-white/5 border-primary/50' : 'bg-white border-primary/40'"
      >
        <img
          [src]="currentUser()!.avatar"
          [alt]="currentUser()!.name"
          class="w-7 h-7 rounded-full object-cover shrink-0"
        />
        <span
          class="text-sm font-semibold hidden sm:block truncate max-w-24"
          [ngClass]="isDark() ? 'text-[#e8e8e8]' : 'text-dark'"
        >{{ currentUser()!.firstName }}</span>
        <span
          class="material-icons text-base transition-transform duration-200 shrink-0"
          [ngClass]="isDark() ? 'text-[#e8e8e8]/40' : 'text-dark/30'"
          [style.transform]="isProfileOpen() ? 'rotate(180deg)' : 'rotate(0)'"
        >expand_more</span>
      </button>

      <!-- Dropdown -->
      <div
        class="absolute top-full right-0 mt-2 w-64 border rounded-2xl shadow-xl overflow-hidden transition-all duration-200 origin-top-right z-50"
        [ngClass]="isDark() ? 'bg-[#242424] border-white/10' : 'bg-white border-neutral/50'"
        [class.opacity-0]="!isProfileOpen()"
        [class.scale-95]="!isProfileOpen()"
        [class.pointer-events-none]="!isProfileOpen()"
        [class.opacity-100]="isProfileOpen()"
        [class.scale-100]="isProfileOpen()"
      >

        <!-- User info — clickable → dashboard -->
        <button
          (click)="goToDashboard()"
          class="w-full px-4 py-4 flex items-center gap-3 transition-colors text-left border-none bg-transparent cursor-pointer"
          [ngClass]="isDark()
            ? 'border-b border-white/10 hover:bg-white/5'
            : 'border-b border-neutral/30 hover:bg-neutral/10'"
        >
          <img
            [src]="currentUser()!.avatar"
            class="w-10 h-10 rounded-full object-cover border-2 shrink-0"
            [ngClass]="isDark() ? 'border-white/20' : 'border-neutral/40'"
          />
          <div class="min-w-0 flex-1">
            <p class="text-sm font-bold truncate" [ngClass]="isDark() ? 'text-[#e8e8e8]' : 'text-dark'">
              {{ currentUser()!.name }}
            </p>
            <p class="text-xs truncate" [ngClass]="isDark() ? 'text-[#e8e8e8]/55' : 'text-dark/40'">
              {{ currentUser()!.email }}
            </p>
          </div>
          <span class="material-icons text-base shrink-0"
            [ngClass]="isDark() ? 'text-[#e8e8e8]/25' : 'text-dark/20'">
            chevron_right
          </span>
        </button>

        <!-- Current plan -->
        <div
          class="px-4 py-3 flex items-center gap-3"
          [ngClass]="isDark() ? 'border-b border-white/10' : 'border-b border-neutral/30'"
        >
          <span class="material-icons text-base text-primary">workspace_premium</span>
          <div class="min-w-0 flex-1">
            <p class="text-xs font-medium" [ngClass]="isDark() ? 'text-[#e8e8e8]/55' : 'text-dark/40'">
              Current plan
            </p>
            <p class="text-sm font-bold flex items-center gap-1.5"
              [ngClass]="currentUser()!.plan === 'Pro' || currentUser()!.plan === 'Basic'
                ? 'text-primary'
                : (isDark() ? 'text-[#e8e8e8]' : 'text-dark')"
            >
              {{ currentUser()!.plan }}
              <span *ngIf="currentUser()!.isTrial"
                class="text-xs font-semibold px-2 py-0.5 rounded-full bg-primary/10 text-primary">
                Trial
              </span>
            </p>
          </div>
        </div>

        <!-- Log out -->
        <div class="py-1.5">
          <button
            (click)="logout()"
            class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm transition-colors cursor-pointer border-none bg-transparent text-left"
            [ngClass]="isDark() ? 'text-[#e8e8e8]/65 hover:bg-white/5' : 'text-dark/60 hover:bg-neutral/20'"
          >
            <span class="material-icons text-base"
              [ngClass]="isDark() ? 'text-[#e8e8e8]/65' : 'text-dark/60'">logout</span>
            Log out
          </button>
        </div>

      </div>
    </div>

  </div>
</nav>

<!-- Click outside closes dropdown -->
<div *ngIf="isProfileOpen()" class="fixed inset-0 z-40" (click)="closeProfile()"></div>

<!-- Cancel Modal -->
<div
  *ngIf="isCancelModalOpen()"
  class="fixed inset-0 z-50 flex items-center justify-center px-4"
  (click)="closeCancelModal()"
>
  <div
    class="absolute inset-0"
    style="backdrop-filter: blur(4px)"
    [ngClass]="isDark() ? 'bg-black/60' : 'bg-black/25'"
  ></div>

  <div
    class="relative rounded-2xl shadow-2xl w-full max-w-sm p-7 flex flex-col gap-5"
    [ngClass]="isDark() ? 'bg-[#242424]' : 'bg-white'"
    (click)="$event.stopPropagation()"
  >
    <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center mx-auto">
      <span class="material-icons text-red-400 text-2xl">cancel</span>
    </div>
    <div class="text-center">
      <h3 class="font-display font-bold text-xl tracking-tight mb-2"
        [ngClass]="isDark() ? 'text-[#e8e8e8]' : 'text-dark'">
        Cancel your Pro plan?
      </h3>
      <p class="text-sm leading-relaxed"
        [ngClass]="isDark() ? 'text-[#e8e8e8]/55' : 'text-dark/50'">
        You will lose access to 4K downloads, personal cloud storage, and priority speed at the end of your billing period.
      </p>
    </div>
    <div class="flex flex-col gap-2 mt-1">
      <button
        (click)="confirmCancel()"
        [disabled]="isCancelling()"
        class="w-full py-3 rounded-xl text-sm font-bold bg-red-500 text-white hover:bg-red-600 transition-colors cursor-pointer disabled:opacity-60"
      >
        <span *ngIf="!isCancelling()">Yes, cancel my plan</span>
        <span *ngIf="isCancelling()" class="flex items-center justify-center gap-2">
          <span class="material-icons text-base animate-spin">sync</span>
          Cancelling...
        </span>
      </button>
      <button
        (click)="closeCancelModal()"
        [disabled]="isCancelling()"
        class="w-full py-3 rounded-xl text-sm font-bold border transition-colors cursor-pointer disabled:opacity-60"
        [ngClass]="isDark()
          ? 'border-white/15 text-[#e8e8e8]/60 hover:border-white/30 hover:text-[#e8e8e8]'
          : 'border-neutral text-dark/60 hover:border-primary/40 hover:text-dark'"
      >
        Keep my Pro plan
      </button>
    </div>
  </div>
</div>
