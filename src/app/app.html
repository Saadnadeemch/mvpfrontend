<div class="min-h-screen flex flex-col transition-colors duration-500"
     [ngClass]="isDark ? 'bg-[#1c1c1c] text-[#f0f0f0]' : 'bg-white text-dark'">

  <!-- Navbar -->
  <nav class="flex items-center justify-between px-4 sm:px-6 md:px-10 lg:px-12 py-4">

    <!-- Logo -->
    <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
      <img
        src="https://i.ibb.co/XkGHSPKG/Untitled-design.png"
        alt="Logo"
        class="h-9 w-auto object-contain rounded-xl"
      />
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-4">

      <!-- Dark / Light Toggle -->
      <button
        (click)="toggleTheme()"
        [attr.title]="isDark ? 'Switch to Light mode' : 'Switch to Dark mode'"
        class="relative w-14 h-7 rounded-full transition-all duration-500 ease-in-out border-2 focus:outline-none flex items-center px-1"
        [ngClass]="isDark ? 'bg-primary border-primary' : 'bg-transparent border-primary'"
      >
        <span
          class="w-5 h-5 rounded-full flex items-center justify-center transition-all duration-500 ease-in-out shadow-sm"
          [ngClass]="isDark ? 'translate-x-6 bg-white' : 'translate-x-0 bg-primary'"
        >
          <svg *ngIf="!isDark" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707 8.001 8.001 0 1017.293 13.293z"/>
          </svg>
          <svg *ngIf="isDark" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-primary" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
        </span>
      </button>

      <!-- NOT logged in: Upgrade button -->
      <button
        *ngIf="!isLoggedIn"
        routerLink="/pricing"
        class="px-6 md:px-8 py-2.5 rounded-2xl border border-primary text-primary font-medium hover:bg-primary hover:text-white transition-all duration-300 ease-in-out text-sm"
      >
        Upgrade
      </button>

      <!-- Logged in: Avatar pill with dropdown -->
      <div class="relative" *ngIf="isLoggedIn">
        <button
          (click)="toggleProfile()"
          class="flex items-center gap-2.5 pl-2 pr-3 py-1.5 rounded-full border transition-all cursor-pointer"
          [ngClass]="isDark ? 'border-white/20 bg-white/5 hover:border-primary/50' : 'border-neutral/60 bg-white hover:border-primary/40'"
        >
          <img [src]="currentUser.avatar" [alt]="currentUser.name" class="w-7 h-7 rounded-full object-cover" />
          <span class="text-sm font-semibold hidden sm:block"
            [ngClass]="isDark ? 'text-white/80' : 'text-dark'">
            {{ currentUser.firstName }}
          </span>
          <span class="material-icons text-base transition-transform"
            [ngClass]="isDark ? 'text-white/30' : 'text-dark/30'"
            [style.transform]="isProfileOpen ? 'rotate(180deg)' : 'rotate(0)'">
            expand_more
          </span>
        </button>

        <!-- Profile Dropdown -->
        <div
          class="absolute top-full right-0 mt-2 w-60 border rounded-2xl shadow-xl overflow-hidden transition-all duration-200 origin-top-right z-50"
          [ngClass]="isDark ? 'bg-[#242424] border-white/10' : 'bg-white border-neutral/50'"
          [class.opacity-0]="!isProfileOpen"
          [class.scale-95]="!isProfileOpen"
          [class.pointer-events-none]="!isProfileOpen"
          [class.opacity-100]="isProfileOpen"
          [class.scale-100]="isProfileOpen"
        >
          <!-- User info -->
          <div class="px-4 py-4" [ngClass]="isDark ? 'border-b border-white/10' : 'border-b border-neutral/30'">
            <div class="flex items-center gap-3">
              <img [src]="currentUser.avatar" class="w-10 h-10 rounded-full object-cover border-2"
                [ngClass]="isDark ? 'border-white/20' : 'border-neutral/40'" />
              <div class="min-w-0">
                <p class="text-sm font-bold truncate" [ngClass]="isDark ? 'text-white/90' : 'text-dark'">{{ currentUser.name }}</p>
                <p class="text-xs truncate" [ngClass]="isDark ? 'text-white/40' : 'text-dark/40'">{{ currentUser.email }}</p>
              </div>
            </div>
          </div>

          <!-- Plan -->
          <div class="px-4 py-3 flex items-center justify-between"
            [ngClass]="isDark ? 'border-b border-white/10' : 'border-b border-neutral/30'">
            <div class="flex items-center gap-2">
              <span class="material-icons text-base text-primary">workspace_premium</span>
              <div>
                <p class="text-xs font-medium" [ngClass]="isDark ? 'text-white/40' : 'text-dark/40'">Current plan</p>
                <p class="text-sm font-bold"
                  [class.text-primary]="currentUser.plan === 'Pro'"
                  [ngClass]="currentUser.plan !== 'Pro' ? (isDark ? 'text-white/80' : 'text-dark') : ''">
                  {{ currentUser.plan }}
                </p>
              </div>
            </div>
            <a *ngIf="currentUser.plan !== 'Pro'" routerLink="/pricing"
              (click)="isProfileOpen = false"
              class="text-xs font-bold text-primary bg-primary/10 px-3 py-1 rounded-full hover:bg-primary/20 transition-colors">
              Upgrade
            </a>
          </div>

          <!-- Actions -->
          <div class="py-1.5">
            <button *ngIf="currentUser.plan === 'Pro'"
              (click)="openCancelModal(); isProfileOpen = false"
              class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm text-red-500 transition-colors cursor-pointer"
              [ngClass]="isDark ? 'hover:bg-red-500/10' : 'hover:bg-red-50'">
              <span class="material-icons text-base">cancel</span>
              Cancel Pro
            </button>
            <button
              (click)="logout()"
              class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm transition-colors cursor-pointer"
              [ngClass]="isDark ? 'text-white/50 hover:bg-white/5' : 'text-dark/60 hover:bg-neutral/20'">
              <span class="material-icons text-base">logout</span>
              Log out
            </button>
          </div>
        </div>
      </div>

    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1 flex flex-col items-center justify-center w-full px-4">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="py-12 flex flex-col items-center gap-6 select-none">
    <div class="social-container flex flex-col items-center gap-3 cursor-default">
      <div class="flex items-center justify-center gap-5">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube" class="social-icon h-5 w-5" />
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" class="social-icon h-5 w-5" />
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter" class="social-icon h-5 w-5" />
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok" class="social-icon h-5 w-5" />
        <span class="social-text text-neutral text-sm font-bold transition-colors">+ 1800 more</span>
      </div>
    </div>
  </footer>

</div>

<!-- Click outside to close dropdown -->
<div *ngIf="isProfileOpen" class="fixed inset-0 z-40" (click)="isProfileOpen = false"></div>

<!-- ── Cancel Modal ── -->
<div *ngIf="isCancelModalOpen"
  class="fixed inset-0 z-50 flex items-center justify-center px-4"
  (click)="closeCancelModal()">
  <div class="absolute inset-0 backdrop-blur-sm"
    [ngClass]="isDark ? 'bg-black/50' : 'bg-dark/20'"></div>
  <div class="relative rounded-2xl shadow-2xl w-full max-w-sm p-7 flex flex-col gap-5"
    [ngClass]="isDark ? 'bg-[#242424]' : 'bg-white'"
    (click)="$event.stopPropagation()">
    <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center mx-auto">
      <span class="material-icons text-red-400 text-2xl">cancel</span>
    </div>
    <div class="text-center">
      <h3 class="font-display font-bold text-xl tracking-tight mb-2"
        [ngClass]="isDark ? 'text-white/90' : 'text-dark'">Cancel your Pro plan?</h3>
      <p class="text-sm leading-relaxed"
        [ngClass]="isDark ? 'text-white/45' : 'text-dark/50'">
        You will lose access to 4K downloads, personal cloud storage, and priority speed at the end of your billing period. This cannot be undone.
      </p>
    </div>
    <div class="flex flex-col gap-2 mt-1">
      <button
        (click)="confirmCancel()"
        [disabled]="isCancelling"
        class="w-full py-3 rounded-xl text-sm font-bold bg-red-500 text-white hover:bg-red-600 transition-colors cursor-pointer disabled:opacity-60">
        <span *ngIf="!isCancelling">Yes, cancel my plan</span>
        <span *ngIf="isCancelling" class="flex items-center justify-center gap-2">
          <span class="material-icons text-base animate-spin">sync</span>
          Cancelling…
        </span>
      </button>
      <button
        (click)="closeCancelModal()"
        [disabled]="isCancelling"
        class="w-full py-3 rounded-xl text-sm font-bold border transition-colors cursor-pointer disabled:opacity-60"
        [ngClass]="isDark ? 'border-white/15 text-white/50 hover:border-white/30 hover:text-white/80' : 'border-neutral text-dark/60 hover:border-primary/40 hover:text-dark'">
        Keep my Pro plan
      </button>
    </div>
  </div>
</div>
